<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Successful - Confirmation</title>
    <style>
      :root {
        --main-color: #ff790b;
        --p-color: #7b7b7b;
        --bg-color: #f3f3f3;
        --white-color: #fff;
        --color-heading: #121416;
        --border-color: #e5e5e5d5;
        --success-color: #28a745;
        --error-color: #e51a1a;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: var(--bg-color);
        color: var(--p-color);
      }

      .container {
        background: var(--white-color);
        padding: 50px 30px;
        border-radius: 16px;
        border: 1px solid var(--border-color);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        max-width: 450px;
        width: 90%;
        text-align: center;
      }

      .icon-box {
        width: 80px;
        height: 80px;
        background: #fff4ec;
        color: var(--main-color);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        margin: 0 auto 20px;
      }

      h1 {
        font-size: 1.8rem;
        color: var(--color-heading);
        margin-bottom: 15px;
      }

      p {
        font-size: 1rem;
        line-height: 1.6;
        margin-bottom: 25px;
        color: var(--p-color);
      }

      .status {
        display: block;
        padding: 15px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 1.1rem;
        margin-bottom: 30px;
        background-color: #f9f9f9;
      }

      .status.success {
        color: var(--success-color);
        border-left: 5px solid var(--success-color);
      }

      .status.failed {
        color: var(--error-color);
        border-left: 5px solid var(--error-color);
      }
      .status.pending {
        color: #ff9900;
        border-left: 5px solid #ff9900;
      }

      .button {
        display: block;
        width: 100%;
        padding: 15px;
        background-color: var(--main-color);
        color: var(--white-color);
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
        transition:
          transform 0.2s,
          background 0.3s;
      }

      .button:hover {
        background-color: #e06600;
        transform: translateY(-2px);
      }

      /* Animation for smooth appearance */
      .container {
        animation: fadeIn 0.6s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon-box">✓</div>
      <h1>Payment Received!</h1>
      <p>
        Thank you for your purchase. Your transaction has been successfully
        processed.
      </p>

      <div id="order-status" class="status">🔍 Verifying order status...</div>

      <a href="/index.html" class="button">Return to Home</a>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");

      // Local check for development purposes (matches your server port)
      // use relative path for deployed environment; local dev needs host
      const apiBase =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1"
          ? "http://localhost:3000"
          : "";

      if (!sessionId) {
        const statusEl = document.getElementById("order-status");
        statusEl.innerText = "No session ID found ❌";
        statusEl.classList.add("failed");
      } else {
        const statusEl = document.getElementById("order-status");
        // helper that checks the status and updates UI; returns promise that
        // resolves with the latest data object.
        const checkStatus = () =>
          fetch(`${apiBase}/api/order-status?session_id=${sessionId}`)
            .then((res) => res.json())
            .then((data) => {
              if (data.status === "paid") {
                statusEl.innerText = "Order Confirmed & Paid ✅";
                statusEl.classList.remove("pending", "failed");
                statusEl.classList.add("success");
              } else if (data.status === "pending") {
                statusEl.innerText = "Order received – payment pending ⏳";
                statusEl.classList.remove("success", "failed");
                statusEl.classList.add("pending");
              } else if (data.status === "not_found") {
                statusEl.innerText = "Order not found in database ❌";
                statusEl.classList.remove("success", "pending");
                statusEl.classList.add("failed");
              } else {
                statusEl.innerText =
                  data.error || "Unable to determine order status.";
                statusEl.classList.remove("success", "pending");
                statusEl.classList.add("failed");
              }
              return data;
            })
            .catch((err) => {
              console.error("Fetch order error:", err);
              statusEl.innerText = "Unable to verify payment status.";
              statusEl.classList.remove("success", "pending");
              statusEl.classList.add("failed");
              return { status: "error" };
            });

        // perform initial check, and if still pending, poll every 3s up to a
        // short timeout so the page updates when the webhook runs.
        checkStatus().then((data) => {
          if (data.status === "pending") {
            const interval = setInterval(() => {
              checkStatus().then((d) => {
                if (d.status === "paid" || d.status === "not_found") {
                  clearInterval(interval);
                }
              });
            }, 3000);
          }
        });
      }
    </script>
  </body>
</html>
